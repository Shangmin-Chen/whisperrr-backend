# Supabase Auth (JWT resource server). Set both from your project:
# https://<project-ref>.supabase.co/auth/v1/.well-known/jwks.json
# https://<project-ref>.supabase.co/auth/v1
#
# Postgres: DATABASE_PROJECT_REF + DATABASE_PASSWORD + DATABASE_POOLER_REGION (required). JDBC URL is built in
# SupabasePostgresDataSourceConfig (session pooler aws-0-<region>.pooler.supabase.com, user postgres.<ref>).
# Pooler region slug: Supabase Project Settings → Connect → Session pooler.
#
spring:
  flyway:
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_JWT_JWK_SET_URI}
          issuer-uri: ${SUPABASE_JWT_ISSUER_URI}
